<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#3c2868"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b4dc50" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b4dc50" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative glow blobs -->
  <circle cx="680" cy="80" r="180" fill="#b4dc50" opacity="0.12"/>
  <circle cx="100" cy="500" r="140" fill="#b4dc50" opacity="0.08"/>

  <!-- Decorative rings -->
  <circle cx="680" cy="80" r="120" stroke="#b4dc50" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="680" cy="80" r="160" stroke="#b4dc50" stroke-width="1" fill="none" opacity="0.12"/>
  <circle cx="100" cy="500" r="90" stroke="#b4dc50" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Icon -->
  <rect x="350" y="140" width="45" height="58" rx="4" fill="#b4dc50" opacity="0.9"/>
          <rect x="405" y="140" width="45" height="58" rx="4" fill="#b4dc50" opacity="0.8"/>
          <line x1="395" y1="145" x2="395" y2="193" stroke="white" stroke-width="3"/>
          <line x1="405" y1="145" x2="405" y2="193" stroke="white" stroke-width="3"/>
          <rect x="352" y="198" width="96" height="6" rx="3" fill="#b4dc50" opacity="0.5"/>

  <!-- Label (eyebrow) -->
  <text x="400" y="264" font-family="Arial,sans-serif" font-size="13" font-weight="700" 
        fill="#b4dc50" text-anchor="middle" letter-spacing="3">EDUCATION</text>

  <!-- Divider -->
  <line x1="320" y1="274" x2="480" y2="274" stroke="#b4dc50" stroke-width="2" opacity="0.6"/>

  <!-- Title -->
  <text x="400" y="312" font-family="Georgia,serif" font-size="34" font-weight="600"
        fill="white" text-anchor="middle">Every Child Learns</text>

  <!-- Subtitle -->
  <text x="400" y="305" font-family="Arial,sans-serif" font-size="18" fill="rgba(220,220,220,0.9)" text-anchor="middle">School supplies, mentoring and</text>
<text x="400" y="333" font-family="Arial,sans-serif" font-size="18" fill="rgba(220,220,220,0.9)" text-anchor="middle">the path from daycare to university</text>


  <!-- Bottom rule -->
  <line x1="80" y1="550" x2="720" y2="550" stroke="#b4dc50" stroke-width="1" opacity="0.25"/>
  
  <!-- Foundation name -->
  <text x="400" y="572" font-family="Arial,sans-serif" font-size="13" 
        fill="rgba(255,255,255,0.5)" text-anchor="middle">Mother Evelyn Child-Care Foundation</text>
</svg>