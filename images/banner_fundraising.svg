<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1344"/>
      <stop offset="100%" stop-color="#5a2f82"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0145a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e0145a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative glow blobs -->
  <circle cx="680" cy="80" r="180" fill="#e0145a" opacity="0.12"/>
  <circle cx="100" cy="500" r="140" fill="#e0145a" opacity="0.08"/>

  <!-- Decorative rings -->
  <circle cx="680" cy="80" r="120" stroke="#e0145a" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="680" cy="80" r="160" stroke="#e0145a" stroke-width="1" fill="none" opacity="0.12"/>
  <circle cx="100" cy="500" r="90" stroke="#e0145a" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- Icon -->
  <circle cx="400" cy="185" r="55" stroke="#e0145a" stroke-width="5" fill="none"/>
          <line x1="345" y1="185" x2="455" y2="185" stroke="#e0145a" stroke-width="3"/>
          <line x1="400" y1="130" x2="400" y2="240" stroke="#e0145a" stroke-width="3"/>
          <ellipse cx="400" cy="185" rx="28" ry="55" stroke="#e0145a" stroke-width="3" fill="none"/>

  <!-- Label (eyebrow) -->
  <text x="400" y="264" font-family="Arial,sans-serif" font-size="13" font-weight="700" 
        fill="#e0145a" text-anchor="middle" letter-spacing="3">FUNDRAISING &amp; PARTNERSHIPS</text>

  <!-- Divider -->
  <line x1="320" y1="274" x2="480" y2="274" stroke="#e0145a" stroke-width="2" opacity="0.6"/>

  <!-- Title -->
  <text x="400" y="312" font-family="Georgia,serif" font-size="34" font-weight="600"
        fill="white" text-anchor="middle">Growing Together</text>

  <!-- Subtitle -->
  <text x="400" y="305" font-family="Arial,sans-serif" font-size="18" fill="rgba(220,220,220,0.9)" text-anchor="middle">Raising funds and building partnerships</text>
<text x="400" y="333" font-family="Arial,sans-serif" font-size="18" fill="rgba(220,220,220,0.9)" text-anchor="middle">across Africa and the wider world</text>


  <!-- Bottom rule -->
  <line x1="80" y1="550" x2="720" y2="550" stroke="#e0145a" stroke-width="1" opacity="0.25"/>
  
  <!-- Foundation name -->
  <text x="400" y="572" font-family="Arial,sans-serif" font-size="13" 
        fill="rgba(255,255,255,0.5)" text-anchor="middle">Mother Evelyn Child-Care Foundation</text>
</svg>